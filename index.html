<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Radar-Ads · 20/60 Cooldown</title>
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Raleway:wght@400;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Raleway', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
      padding: 12px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(20, 20, 20, 0.85);
      padding: 24px 18px;
      border-radius: 28px;
      width: 380px;
      max-width: 100%;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 204, 0.25);
      text-align: center;
      backdrop-filter: blur(4px);
      max-height: 95vh;
      overflow-y: auto;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: #00ffcc;
      text-shadow: 0 0 12px #00ffcc88;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .developer {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(90deg, #ff5f6d, #ffc371);
      box-shadow: 0 4px 12px #ff5f6d55;
      transition: 0.3s;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .stats p {
      font-size: 16px;
      margin: 8px 0;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid #2a2a5a;
    }

    .progress-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(#00ffcc 0%, #00ffcc 0%, rgba(0, 255, 204, 0.1) 100%);
      margin: 18px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
      color: #00ffcc;
      box-shadow: 0 0 20px #00ffcc33, inset 0 0 8px #00000055;
    }

    .buttons button {
      width: 100%;
      padding: 13px;
      margin: 7px 0;
      border: none;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(145deg, #ff512f, #dd2476);
      box-shadow: 0 6px 0 #8b1a4a, 0 6px 12px black;
      transition: all 0.1s;
    }
    .buttons button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #8b1a4a, 0 6px 12px black;
    }
    .buttons button:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 4px 0 #5a2e4a;
      cursor: not-allowed;
    }

    /* REFERRAL CARD – fixed button overflow */
    .referral-card {
      background: rgba(15, 20, 35, 0.95);
      border-radius: 24px;
      padding: 18px 14px;
      margin: 20px 0 12px;
      border: 1px solid #4a6fa5;
      box-shadow: 0 8px 0 #0f1a2a;
      backdrop-filter: blur(4px);
    }
    .ref-title {
      font-size: 18px;
      font-weight: 700;
      color: #FFD966;
      margin-bottom: 14px;
    }
    .ref-link-row {
      display: flex;
      gap: 6px;
      margin: 10px 0;
      align-items: center;
      flex-wrap: nowrap;        /* prevent wrapping */
    }
    .ref-link-input {
      flex: 1;
      min-width: 0;              /* allow shrinking */
      background: #0f1322;
      border: 1px solid #3e5a7c;
      border-radius: 40px;
      padding: 10px 12px;
      color: #ddd;
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .copy-btn, .share-btn {
      border: none;
      color: white;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      border-radius: 40px;
      padding: 8px 12px;
      box-shadow: 0 4px 0 #0f1a2a;
      transition: 0.1s;
      white-space: nowrap;
      flex-shrink: 0;            /* prevent shrinking */
    }
    .copy-btn {
      background: #2a3a5a;
    }
    .share-btn {
      background: #2e5f4b;
      box-shadow: 0 4px 0 #1a3a2e;
    }
    .copy-btn:active, .share-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0f1a2a;
    }
    .share-btn:active {
      box-shadow: 0 2px 0 #1a3a2e;
    }

    .ref-stats {
      display: flex;
      justify-content: space-around;
      margin-top: 18px;
      background: #1a1f33;
      border-radius: 40px;
      padding: 12px 8px;
    }
    .ref-stat-item {
      text-align: center;
    }
    .ref-stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #FFB347;
    }

    .withdraw-section {
      margin-top: 15px;
      display: none;
      background: rgba(20, 20, 30, 0.95);
      padding: 22px 18px;
      border-radius: 24px;
      border: 1px solid #3f3f6b;
    }
    .withdraw-section input, .withdraw-section select {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: 40px;
      border: 1px solid #3e4b6b;
      background: #0f0f1e;
      color: #fff;
      font-size: 15px;
    }
    .withdraw-section button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      font-weight: bold;
      background: linear-gradient(145deg, #1FA2FF, #12D8FA, #A6FFCB);
      color: #0b0b1a;
      border: none;
      border-radius: 40px;
      box-shadow: 0 6px 0 #0f6b8f;
    }
    #withdraw-status { margin-top: 12px; color: #ff8a8a; }

    .links a {
      display: block;
      margin: 15px 0 5px;
      padding: 14px;
      border-radius: 60px;
      font-weight: bold;
      text-decoration: none;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #0f0c1c;
      box-shadow: 0 6px 0 #b3760e;
    }
    .ad-status-tip { font-size: 13px; margin-top: 12px; opacity: 0.8; }
  </style>
</head>
<body>

<div class="container">
  <h1>⚡RADAR·ADS</h1>
  <a href="https://trickbd.com" target="_blank" class="developer">✨ Happy Earning ✨</a>

  <div class="stats">
    <p>📺 Watched Ads: <span id="watched-ads">0</span></p>
    <p>💰 Earned Points: <span id="earned-points">0.00</span></p>
  </div>

  <div class="progress-circle" id="progress-circle">
    <span id="ads-progress">0%</span>
  </div>

  <div class="buttons">
    <button id="watch-ad-btn">▶ Watch Ad (+0.5)</button>
    <button id="auto-ad-btn">⚡ Auto Ads (6s)</button>
    <button id="stop-auto-btn" disabled>⏹ Stop Auto</button>
    <button id="toggle-withdraw-btn">💸 Withdraw</button>
  </div>

  <!-- REFERRAL CARD – buttons stay in one row -->
  <div class="referral-card">
    <div class="ref-title">🤝 REFER & EARN <span style="font-size:14px;">(+5 pts/invite)</span></div>
    
    <div class="ref-link-row">
      <input type="text" class="ref-link-input" id="referralLinkInput" readonly value="loading...">
      <button class="copy-btn" id="copyLinkBtn">📋 Copy</button>
      <button class="share-btn" id="shareLinkBtn">📤 Share</button>
    </div>

    <div class="ref-stats">
      <div class="ref-stat-item">
        <div class="ref-stat-value" id="referralCount">0</div>
        <div style="font-size:12px;">👥 Invited</div>
      </div>
      <div class="ref-stat-item">
        <div class="ref-stat-value" id="referralEarnings">0.0</div>
        <div style="font-size:12px;">🎁 Bonus pts</div>
      </div>
    </div>
    <p style="font-size:12px; margin-top:10px; color:#aabae0;">Share your link · Get 5 pts when friend joins & watches 1st ad</p>
  </div>

  <!-- Withdraw panel -->
  <div class="withdraw-section" id="withdraw-section">
    <input type="number" id="withdraw-amount" placeholder="Points (min 5)" step="0.1" min="5">
    <select id="payment-method">
      <option value="bkash">bKash</option>
      <option value="nagad">Nagad</option>
      <option value="manual">Manual / Other</option>
    </select>
    <input type="text" id="withdraw-phone" placeholder="Phone / Account">
    <button id="submit-withdraw">✔ Submit Withdrawal</button>
    <p id="withdraw-status"></p>
  </div>

  <div class="links">
    <a href="https://t.me/bestearningmethod" target="_blank">💬 Telegram Support</a>
  </div>
  <div class="ad-status-tip" id="ad-loader-status">⚙️ Ad system loading…</div>
</div>

<!-- Monetag SDK -->
<script src='//libtl.com/sdk.js' data-zone='10831466' data-sdk='show_10831466'></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  (function(){
    "use strict";

    // ---------- STATE ----------
    let watchedAdsCount = parseInt(localStorage.getItem('watchedAdsCount')) || 0;
    let earnedPoints = parseFloat(localStorage.getItem('earnedPoints')) || 0.0;
    let adCountSession = parseInt(localStorage.getItem('adCountSession')) || 0;
    let lastCooldownStart = parseInt(localStorage.getItem('lastCooldownStart')) || 0;
    
    let autoAdInterval = null;
    let isAdInProgress = false;
    let monetagReady = false;
    let sdkCheckAttempts = 0;

    // Referral
    let myReferralCode = localStorage.getItem('myReferralCode');
    if (!myReferralCode) {
      myReferralCode = Math.random().toString(36).substring(2, 8).toUpperCase();
      localStorage.setItem('myReferralCode', myReferralCode);
    }
    let referralCount = parseInt(localStorage.getItem('referralCount')) || 0;
    let referralEarnings = parseFloat(localStorage.getItem('referralEarnings')) || 0.0;
    
    const urlParams = new URLSearchParams(window.location.search);
    const refParam = urlParams.get('ref');
    if (refParam && refParam.trim() !== '') {
      const processedKey = `ref_processed_${refParam}`;
      if (!localStorage.getItem(processedKey)) {
        localStorage.setItem(processedKey, '1');
        const referrerRewardKey = `ref_reward_${refParam}`;
        let currentRefReward = parseFloat(localStorage.getItem(referrerRewardKey)) || 0;
        currentRefReward += 5.0;
        localStorage.setItem(referrerRewardKey, currentRefReward.toFixed(1));
        const referrerCountKey = `ref_count_${refParam}`;
        let currentRefCount = parseInt(localStorage.getItem(referrerCountKey)) || 0;
        currentRefCount += 1;
        localStorage.setItem(referrerCountKey, currentRefCount);
        earnedPoints += 2.0;
        localStorage.setItem('earnedPoints', earnedPoints.toFixed(2));
      }
    }
    
    function loadMyReferralStats() {
      const rewardKey = `ref_reward_${myReferralCode}`;
      const countKey = `ref_count_${myReferralCode}`;
      referralEarnings = parseFloat(localStorage.getItem(rewardKey)) || 0.0;
      referralCount = parseInt(localStorage.getItem(countKey)) || 0;
      localStorage.setItem('referralEarnings', referralEarnings);
      localStorage.setItem('referralCount', referralCount);
    }
    loadMyReferralStats();

    // DOM
    const watchedSpan = document.getElementById('watched-ads');
    const pointsSpan = document.getElementById('earned-points');
    const progressCircle = document.getElementById('progress-circle');
    const progressText = document.getElementById('ads-progress');
    const watchBtn = document.getElementById('watch-ad-btn');
    const autoBtn = document.getElementById('auto-ad-btn');
    const stopAutoBtn = document.getElementById('stop-auto-btn');
    const withdrawSection = document.getElementById('withdraw-section');
    const toggleWithdrawBtn = document.getElementById('toggle-withdraw-btn');
    const submitWithdrawBtn = document.getElementById('submit-withdraw');
    const withdrawAmount = document.getElementById('withdraw-amount');
    const paymentMethod = document.getElementById('payment-method');
    const withdrawPhone = document.getElementById('withdraw-phone');
    const withdrawStatus = document.getElementById('withdraw-status');
    const loaderStatus = document.getElementById('ad-loader-status');
    
    const referralLinkInput = document.getElementById('referralLinkInput');
    const referralCountSpan = document.getElementById('referralCount');
    const referralEarningsSpan = document.getElementById('referralEarnings');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const shareLinkBtn = document.getElementById('shareLinkBtn');

    function refreshAllUI() {
      watchedSpan.textContent = watchedAdsCount;
      pointsSpan.textContent = earnedPoints.toFixed(2);
      updateProgressCircle();
      const baseUrl = window.location.origin + window.location.pathname;
      referralLinkInput.value = `${baseUrl}?ref=${myReferralCode}`;
      loadMyReferralStats();
      referralCountSpan.textContent = referralCount;
      referralEarningsSpan.textContent = referralEarnings.toFixed(1);
      checkCooldownAndDisableButtons();
    }

    function updateProgressCircle() {
      let percent = Math.min((watchedAdsCount / 10) * 100, 100);
      progressText.textContent = Math.floor(percent) + '%';
      progressCircle.style.background = `conic-gradient(#00ffcc ${percent}%, rgba(0, 255, 204, 0.1) ${percent}%)`;
    }

    function saveAdData() {
      localStorage.setItem('watchedAdsCount', watchedAdsCount);
      localStorage.setItem('earnedPoints', earnedPoints.toFixed(2));
      localStorage.setItem('adCountSession', adCountSession);
      localStorage.setItem('lastCooldownStart', lastCooldownStart);
    }

    function isInCooldown() {
      if (adCountSession >= 20) {
        const now = Date.now();
        if (now - lastCooldownStart < 60000) return true;
        else { adCountSession = 0; lastCooldownStart = 0; saveAdData(); return false; }
      }
      return false;
    }

    function getCooldownRemainingSeconds() {
      if (adCountSession >= 20 && lastCooldownStart) {
        return Math.ceil(Math.max(0, 60000 - (Date.now() - lastCooldownStart)) / 1000);
      }
      return 0;
    }

    function checkCooldownAndDisableButtons() {
      if (isInCooldown()) {
        watchBtn.disabled = true;
        if (autoAdInterval) stopAutoAds();
        loaderStatus.innerHTML = `⏳ Cooldown: ${getCooldownRemainingSeconds()}s`;
      } else {
        if (monetagReady) watchBtn.disabled = false;
        loaderStatus.innerHTML = monetagReady ? '✅ Ready' : '⚙️ Loading...';
      }
    }

    function checkMonetagSDK() {
      sdkCheckAttempts++;
      if (typeof window.show_10831466 === 'function') {
        monetagReady = true;
        checkCooldownAndDisableButtons();
      } else if (sdkCheckAttempts < 30) {
        setTimeout(checkMonetagSDK, 500);
      } else {
        loaderStatus.innerHTML = '⚠️ Ad service unavailable';
      }
    }

    async function watchAdAction() {
      if (!monetagReady) {
        Swal.fire({ icon: 'warning', title: 'Not ready', text: 'Ad service still loading.', background: '#1a1a2e', color: '#fff' });
        return false;
      }
      if (isInCooldown()) {
        Swal.fire({ icon: 'warning', title: 'Cooldown', text: `Wait ${getCooldownRemainingSeconds()}s`, background: '#1a1a2e', color: '#fff' });
        return false;
      }
      if (isAdInProgress) return false;
      
      isAdInProgress = true;
      watchBtn.disabled = true;
      
      let timerInterval;
      Swal.fire({
        title: '🎬 Ad Playing',
        html: 'Please wait <b>15</b> seconds.',
        timer: 15000,
        timerProgressBar: true,
        background: '#1a1a2e',
        color: '#fff',
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
          Swal.showLoading();
          const b = Swal.getHtmlContainer().querySelector('b');
          timerInterval = setInterval(() => { if (Swal.getTimerLeft()) b.textContent = Math.ceil(Swal.getTimerLeft()/1000); }, 100);
        },
        willClose: () => clearInterval(timerInterval)
      }).then(async (result) => {
        if (result.dismiss === Swal.DismissReason.timer) {
          try { if (typeof window.show_10831466 === 'function') await window.show_10831466(); } catch(e){}
          watchedAdsCount++; earnedPoints += 0.5; adCountSession++;
          if (adCountSession >= 20) {
            lastCooldownStart = Date.now();
            Swal.fire({ icon: 'success', title: '20 Ads done!', text: '60s break started.', background: '#1a1a2e', color: '#fff', timer: 2500, showConfirmButton: false });
          } else {
            Swal.fire({ icon: 'success', title: 'Earned!', text: `+0.5 pts · ${adCountSession}/20`, background: '#1a1a2e', color: '#fff', timer: 1500, showConfirmButton: false });
          }
          saveAdData(); refreshAllUI();
        } else {
          Swal.fire({ icon: 'info', title: 'Ad skipped', background: '#1a1a2e', color: '#fff' });
        }
        isAdInProgress = false;
        if (!isInCooldown() && monetagReady) watchBtn.disabled = false;
        loaderStatus.innerHTML = isInCooldown() ? `⏳ Cooldown: ${getCooldownRemainingSeconds()}s` : '✅ Ready';
      });
      return true;
    }

    function startAutoAds() {
      if (autoAdInterval) return;
      if (!monetagReady) { Swal.fire('Ad not ready'); return; }
      if (isInCooldown()) { Swal.fire({ icon: 'warning', title: 'Cooldown', text: 'Cannot auto during cooldown.' }); return; }
      autoBtn.disabled = true; stopAutoBtn.disabled = false;
      loaderStatus.innerHTML = '🔄 Auto mode ON (6s)';
      autoAdInterval = setInterval(() => {
        if (!isAdInProgress && monetagReady && !isInCooldown()) watchAdAction();
        else if (isInCooldown()) stopAutoAds();
      }, 6000);
    }

    function stopAutoAds() {
      if (autoAdInterval) clearInterval(autoAdInterval);
      autoAdInterval = null;
      autoBtn.disabled = false; stopAutoBtn.disabled = true;
      if (!isInCooldown()) loaderStatus.innerHTML = '⏸ Auto stopped';
    }

    function toggleWithdrawPanel() {
      withdrawSection.style.display = withdrawSection.style.display === 'block' ? 'none' : 'block';
    }

    function handleWithdraw() {
      const amount = parseFloat(withdrawAmount.value);
      const phone = withdrawPhone.value.trim();
      if (isNaN(amount) || amount < 5) { withdrawStatus.textContent = '❌ Min 5 pts'; return; }
      if (amount > earnedPoints) { withdrawStatus.textContent = '❌ Insufficient points'; return; }
      if (!phone) { withdrawStatus.textContent = '❌ Enter phone/account'; return; }
      earnedPoints = parseFloat((earnedPoints - amount).toFixed(2));
      saveAdData(); refreshAllUI();
      withdrawStatus.innerHTML = `✅ ${amount} pts withdrawal (${paymentMethod.value})<br>📞 ${phone}`;
      withdrawAmount.value = ''; withdrawPhone.value = '';
    }

    // Referral copy & share
    copyLinkBtn.addEventListener('click', () => {
      navigator.clipboard?.writeText(referralLinkInput.value).then(() => {
        Swal.fire({ icon: 'success', title: 'Link Copied!', background: '#1a1a2e', color: '#fff', timer: 1500, showConfirmButton: false });
      }).catch(() => Swal.fire({ icon: 'error', text: 'Copy manually', background: '#1a1a2e' }));
    });

    shareLinkBtn.addEventListener('click', () => {
      const link = referralLinkInput.value;
      if (navigator.share) {
        navigator.share({ title: 'Radar-Ads', text: 'Earn by watching ads!', url: link }).catch(()=>{});
      } else {
        navigator.clipboard?.writeText(link).then(() => {
          Swal.fire({ icon: 'info', title: 'Link copied', text: 'Share manually', background: '#1a1a2e', color: '#fff' });
        });
      }
    });

    function applyReferralBonusToEarned() {
      const bonusKey = 'ref_bonus_applied_' + myReferralCode;
      const lastReward = parseFloat(localStorage.getItem(`ref_reward_${myReferralCode}`)) || 0;
      let applied = parseFloat(localStorage.getItem(bonusKey)) || 0;
      if (lastReward > applied) {
        earnedPoints += (lastReward - applied);
        localStorage.setItem(bonusKey, lastReward);
        saveAdData();
      }
    }

    function init() {
      refreshAllUI();
      applyReferralBonusToEarned();
      watchBtn.addEventListener('click', (e) => { e.preventDefault(); watchAdAction(); });
      autoBtn.addEventListener('click', startAutoAds);
      stopAutoBtn.addEventListener('click', stopAutoAds);
      toggleWithdrawBtn.addEventListener('click', toggleWithdrawPanel);
      submitWithdrawBtn.addEventListener('click', handleWithdraw);
      checkMonetagSDK();
      setInterval(() => {
        checkCooldownAndDisableButtons();
        if (isInCooldown()) loaderStatus.innerHTML = `⏳ Cooldown: ${getCooldownRemainingSeconds()}s`;
        else if (monetagReady) loaderStatus.innerHTML = '✅ Ready';
      }, 1000);
      window.addEventListener('beforeunload', () => { if (autoAdInterval) clearInterval(autoAdInterval); });
    }

    init();
  })();
</script>
</body>
</html>
