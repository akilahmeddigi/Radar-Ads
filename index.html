<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Radar-Ads · fixed</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Raleway:wght@400;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Raleway', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(20, 20, 20, 0.85);
      padding: 30px 20px;
      border-radius: 24px;
      width: 360px;
      max-width: 95%;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 204, 0.2);
      text-align: center;
      backdrop-filter: blur(4px);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 500;
      color: #00ffcc;
      text-shadow: 0 0 12px #00ffcc88;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .developer {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(90deg, #ff5f6d, #ffc371);
      box-shadow: 0 4px 12px #ff5f6d55;
      transition: 0.3s;
      margin-bottom: 20px;
      font-size: 15px;
    }
    .developer:hover {
      background: linear-gradient(90deg, #ffc371, #ff5f6d);
      transform: scale(1.02);
    }

    .stats p {
      font-size: 16px;
      margin: 10px 0;
      background: rgba(0, 0, 0, 0.25);
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid #2a2a5a;
    }

    .progress-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: conic-gradient(#00ffcc 0%, #00ffcc 0%, rgba(0, 255, 204, 0.1) 100%);
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
      color: #00ffcc;
      box-shadow: 0 0 20px #00ffcc33, inset 0 0 8px #00000055;
      transition: background 0.2s ease;
    }

    .buttons button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(145deg, #ff512f, #dd2476);
      box-shadow: 0 6px 0 #8b1a4a, 0 6px 12px black;
      transition: all 0.1s ease;
      letter-spacing: 0.5px;
    }
    .buttons button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #8b1a4a, 0 6px 12px black;
    }
    .buttons button:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 4px 0 #5a2e4a, 0 4px 8px black;
      cursor: not-allowed;
    }

    .withdraw-section {
      margin-top: 20px;
      display: none;
      background: rgba(20, 20, 30, 0.95);
      padding: 22px 18px;
      border-radius: 24px;
      border: 1px solid #3f3f6b;
      backdrop-filter: blur(8px);
    }
    .withdraw-section input, .withdraw-section select {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: 40px;
      border: 1px solid #3e4b6b;
      background: #0f0f1e;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .withdraw-section button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      font-weight: bold;
      font-size: 16px;
      border: none;
      border-radius: 40px;
      background: linear-gradient(145deg, #1FA2FF, #12D8FA, #A6FFCB);
      color: #0b0b1a;
      cursor: pointer;
      box-shadow: 0 6px 0 #0f6b8f;
      transition: 0.15s;
    }
    .withdraw-section button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0f6b8f;
    }
    #withdraw-status {
      margin-top: 12px;
      font-size: 14px;
      color: #ff8a8a;
      font-weight: 500;
    }

    .links a {
      display: block;
      margin: 15px 0 5px;
      padding: 14px;
      border-radius: 60px;
      font-weight: bold;
      text-decoration: none;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #0f0c1c;
      box-shadow: 0 6px 0 #b3760e;
      transition: 0.15s;
    }
    .links a:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b3760e;
    }

    /* small status row */
    .ad-status-tip {
      font-size: 13px;
      margin: 10px 0 0;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⚡RADAR·ADS</h1>
  <a href="https://trickbd.com" target="_blank" class="developer">✨ Happy Earning ✨</a>

  <div class="stats">
    <p>📺 Watched Ads: <span id="watched-ads">0</span></p>
    <p>💰 Earned Points: <span id="earned-points">0.00</span></p>
  </div>

  <!-- Progress circle: 10 ads = 100% -->
  <div class="progress-circle" id="progress-circle">
    <span id="ads-progress">0%</span>
  </div>

  <div class="buttons">
    <button id="watch-ad-btn">▶ Watch Ad (+0.5)</button>
    <button id="auto-ad-btn">⚡ Auto Ads (every 6s)</button>
    <button id="stop-auto-btn" disabled>⏹ Stop Auto</button>
    <button id="toggle-withdraw-btn">💸 Withdraw</button>
  </div>

  <!-- Withdraw panel -->
  <div class="withdraw-section" id="withdraw-section">
    <input type="number" id="withdraw-amount" placeholder="Points (min 5)" step="0.1" min="5">
    <select id="payment-method">
      <option value="bkash">bKash</option>
      <option value="nagad">Nagad</option>
      <option value="manual">Manual / Other</option>
    </select>
    <input type="text" id="withdraw-phone" placeholder="Phone / Account">
    <button id="submit-withdraw">✔ Submit Withdrawal</button>
    <p id="withdraw-status"></p>
  </div>

  <div class="links">
    <a href="https://t.me/bestearningmethod" target="_blank">💬 Telegram Support</a>
  </div>
  <div class="ad-status-tip" id="ad-loader-status">⚙️ Ad system loading…</div>
</div>

<!-- Monetag SDK (zone: 10831466) -->
<script src='//libtl.com/sdk.js' data-zone='10831466' data-sdk='show_10831466'></script>

<script>
  (function(){
    "use strict";

    // ---------- STATE ----------
    let watchedAdsCount = parseInt(localStorage.getItem('watchedAdsCount')) || 0;
    let earnedPoints = parseFloat(localStorage.getItem('earnedPoints')) || 0.0;
    
    // Auto ads control
    let autoAdInterval = null;
    let isAdInProgress = false;        // prevent overlapping ad calls
    let monetagReady = false;
    let sdkCheckAttempts = 0;

    // DOM elements
    const watchedSpan = document.getElementById('watched-ads');
    const pointsSpan = document.getElementById('earned-points');
    const progressCircle = document.getElementById('progress-circle');
    const progressText = document.getElementById('ads-progress');
    const watchBtn = document.getElementById('watch-ad-btn');
    const autoBtn = document.getElementById('auto-ad-btn');
    const stopAutoBtn = document.getElementById('stop-auto-btn');
    const withdrawSection = document.getElementById('withdraw-section');
    const toggleWithdrawBtn = document.getElementById('toggle-withdraw-btn');
    const submitWithdrawBtn = document.getElementById('submit-withdraw');
    const withdrawAmount = document.getElementById('withdraw-amount');
    const paymentMethod = document.getElementById('payment-method');
    const withdrawPhone = document.getElementById('withdraw-phone');
    const withdrawStatus = document.getElementById('withdraw-status');
    const loaderStatus = document.getElementById('ad-loader-status');

    // Helper: update UI from variables
    function refreshUI() {
      watchedSpan.textContent = watchedAdsCount;
      pointsSpan.textContent = earnedPoints.toFixed(2);
      updateProgressCircle();
    }

    // Progress: each ad = 10% up to 100%
    function updateProgressCircle() {
      let percent = Math.min((watchedAdsCount / 10) * 100, 100);
      progressText.textContent = Math.floor(percent) + '%';
      progressCircle.style.background = `conic-gradient(#00ffcc ${percent}%, rgba(0, 255, 204, 0.1) ${percent}%)`;
    }

    // Persist to localStorage
    function saveData() {
      localStorage.setItem('watchedAdsCount', watchedAdsCount);
      localStorage.setItem('earnedPoints', earnedPoints.toFixed(2));
    }

    // ---------- SDK READY CHECK ----------
    function checkMonetagSDK() {
      sdkCheckAttempts++;
      // The SDK exposes show_10831466 (zone 10831466)
      if (typeof window.show_10831466 === 'function') {
        monetagReady = true;
        watchBtn.disabled = false;
        loaderStatus.innerHTML = '✅ Ad system ready · Watch & earn';
        console.log('[Radar] Monetag SDK loaded.');
      } else {
        if (sdkCheckAttempts < 30) { // try ~15 sec
          loaderStatus.innerHTML = '⏳ Loading ad provider...';
          setTimeout(checkMonetagSDK, 500);
        } else {
          loaderStatus.innerHTML = '⚠️ Ad service unavailable. Refresh.';
          watchBtn.disabled = true;
        }
      }
    }

    // ---------- WATCH AD (core) ----------
    async function watchAdAction() {
      if (!monetagReady) {
        alert('Ad service not ready yet. Please wait a moment.');
        return false;
      }
      if (isAdInProgress) {
        console.warn('Ad already in progress, skipping.');
        return false;
      }

      isAdInProgress = true;
      watchBtn.disabled = true;
      loaderStatus.innerHTML = '🎬 Showing ad...';

      try {
        // CORRECT function name: show_10831466 (matches data-sdk)
        await window.show_10831466();
        
        // Ad completed successfully
        watchedAdsCount++;
        earnedPoints += 0.5;
        
        // Update UI & storage
        refreshUI();
        saveData();
        loaderStatus.innerHTML = '✅ Ad completed! +0.5 pts';
        
        isAdInProgress = false;
        watchBtn.disabled = false;
        return true;
      } catch (err) {
        console.warn('Ad failed or was skipped:', err);
        loaderStatus.innerHTML = '⚠️ Ad skipped or error. Try again.';
        isAdInProgress = false;
        watchBtn.disabled = false;
        return false;
      }
    }

    // ---------- AUTO ADS (with safety) ----------
    function startAutoAds() {
      if (autoAdInterval) return;
      if (!monetagReady) {
        alert('Ad system not ready. Please wait.');
        return;
      }
      
      autoBtn.disabled = true;
      stopAutoBtn.disabled = false;
      loaderStatus.innerHTML = '🔄 Auto mode ON (every 6s)';
      
      // Use setInterval, but only trigger if not already in progress
      autoAdInterval = setInterval(() => {
        if (!isAdInProgress && monetagReady) {
          // call watch action (async, but we don't await to avoid blocking interval)
          watchAdAction().catch(e => console.warn);
        } else {
          console.log('Auto: ad in progress or not ready, waiting.');
        }
      }, 6000); // 6 seconds to be safe
    }

    function stopAutoAds() {
      if (autoAdInterval) {
        clearInterval(autoAdInterval);
        autoAdInterval = null;
      }
      autoBtn.disabled = false;
      stopAutoBtn.disabled = true;
      loaderStatus.innerHTML = '⏸ Auto ads stopped';
    }

    // ---------- WITHDRAW ----------
    function toggleWithdrawPanel() {
      if (withdrawSection.style.display === 'block') {
        withdrawSection.style.display = 'none';
      } else {
        withdrawSection.style.display = 'block';
        withdrawStatus.textContent = '';
      }
    }

    function handleWithdraw() {
      const amount = parseFloat(withdrawAmount.value);
      const method = paymentMethod.value;
      const phone = withdrawPhone.value.trim();
      
      if (isNaN(amount) || amount < 5) {
        withdrawStatus.textContent = '❌ Minimum 5 points required.';
        return;
      }
      if (amount > earnedPoints) {
        withdrawStatus.textContent = '❌ Insufficient points.';
        return;
      }
      if (phone === '') {
        withdrawStatus.textContent = '❌ Enter phone/account number.';
        return;
      }

      // Deduct points
      earnedPoints = parseFloat((earnedPoints - amount).toFixed(2));
      pointsSpan.textContent = earnedPoints.toFixed(2);
      saveData();
      
      // Show success & reset
      withdrawStatus.innerHTML = `✅ ${amount} pts withdrawal requested (${method})<br>📞 ${phone}`;
      withdrawAmount.value = '';
      withdrawPhone.value = '';
      
      // Optional: you could send data to backend here
      console.log(`Withdraw: ${amount} pts, method: ${method}, contact: ${phone}`);
      
      // Hide panel after 3 sec? (optional)
      setTimeout(() => {
        if (withdrawSection.style.display === 'block') {
          // keep visible but clear status later
        }
      }, 2000);
    }

    // ---------- INITIAL RENDER & EVENT LISTENERS ----------
    function init() {
      refreshUI();
      
      // Watch Ad button
      watchBtn.addEventListener('click', (e) => {
        e.preventDefault();
        watchAdAction();
      });

      // Auto buttons
      autoBtn.addEventListener('click', startAutoAds);
      stopAutoBtn.addEventListener('click', stopAutoAds);

      // Withdraw toggle
      toggleWithdrawBtn.addEventListener('click', toggleWithdrawPanel);
      
      // Submit withdraw
      submitWithdrawBtn.addEventListener('click', handleWithdraw);

      // Close withdraw if click outside? not needed, keep simple.
      
      // Start checking SDK
      checkMonetagSDK();

      // Additional safeguard: if SDK loads later, watchBtn already disabled.
      // Also if page unload, stop auto to prevent memory issues (not mandatory)
      window.addEventListener('beforeunload', function() {
        if (autoAdInterval) clearInterval(autoAdInterval);
      });

      // If user accidentally leaves auto running on hidden, but fine.
    }

    // Also expose stopAutoAds globally for any inline cleanup (not used but safe)
    window.stopAutoAds = stopAutoAds;
    
    // Start everything
    init();

  })();
</script>
</body>
</html>
