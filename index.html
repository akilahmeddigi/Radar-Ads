<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Radar-Ads · Working Loading</title>
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Raleway', sans-serif;
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* ---------- LOADING SCREEN ---------- */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #141a2e, #0a0d16);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loader-radar {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
    }

    .loader-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00ffcc 0%, rgba(0, 255, 204, 0.15) 0%);
      box-shadow: 0 0 25px #00ffcc55, inset 0 0 15px #000000aa;
      border: 1.5px solid #00ffcc66;
      transition: background 0.1s linear;
    }

    .loader-sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, 
        rgba(0, 255, 204, 0) 0deg, 
        rgba(0, 255, 204, 0.5) 25deg, 
        rgba(0, 255, 204, 0) 55deg);
      animation: radarSpin 2s linear infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .loader-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1.5px;
      height: 50%;
      background: linear-gradient(to bottom, #00ffcc, transparent);
      transform-origin: bottom center;
      animation: radarSpin 2s linear infinite;
      box-shadow: 0 0 10px #00ffcc;
    }

    @keyframes radarSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .loading-bar-container {
      width: 160px;
      height: 4px;
      background: #1e2a3a;
      border-radius: 10px;
      margin-top: 5px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px #00000088, 0 0 8px #00ffcc33;
    }

    .loading-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ffcc, #1fa2ff);
      border-radius: 10px;
      box-shadow: 0 0 8px #00ffcc;
    }

    .loading-percent-small {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      margin-top: 8px;
      color: #8aa0cc;
      letter-spacing: 2px;
    }

    .loading-message {
      margin-top: 15px;
      font-size: 12px;
      font-weight: 500;
      color: #b0c7ff;
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0.9;
    }

    /* ---------- MAIN APP (hidden initially) ---------- */
    #main-app {
      opacity: 0;
      transition: opacity 0.4s;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .container {
      background: rgba(20, 20, 20, 0.9);
      padding: 24px 18px;
      border-radius: 28px;
      width: 380px;
      max-width: 100%;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 204, 0.25);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: #00ffcc;
      text-shadow: 0 0 12px #00ffcc88;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .developer {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(90deg, #1e90ff, #00bfff);
      box-shadow: 0 4px 12px #1e90ff55;
      transition: 0.3s;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .stats p {
      font-size: 16px;
      margin: 8px 0;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid #2a2a5a;
    }

    .progress-circle-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 18px auto;
    }

    .progress-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(#00ffcc 0%, #00ffcc 0%, rgba(0, 255, 204, 0.1) 100%);
      box-shadow: 0 0 20px #00ffcc33, inset 0 0 8px #00000055;
    }

    .radar-sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(0,255,204,0) 0deg, rgba(0,255,204,0.4) 30deg, rgba(0,255,204,0) 60deg);
      animation: radarSpin 3s linear infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .radar-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 50%;
      background: linear-gradient(to bottom, #00ffcc, transparent);
      transform-origin: bottom center;
      animation: radarSpin 3s linear infinite;
      box-shadow: 0 0 8px #00ffcc;
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: bold;
      font-size: 22px;
      color: #00ffcc;
      z-index: 5;
      text-shadow: 0 0 10px #00ffcc;
    }

    .buttons button {
      width: 100%;
      padding: 13px;
      margin: 7px 0;
      border: none;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(145deg, #ff512f, #dd2476);
      box-shadow: 0 6px 0 #8b1a4a, 0 6px 12px black;
      transition: all 0.1s;
    }
    .buttons button:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 4px 0 #5a2e4a;
      cursor: not-allowed;
    }

    .referral-card {
      background: rgba(15, 20, 35, 0.95);
      border-radius: 24px;
      padding: 18px 14px;
      margin: 20px 0 12px;
      border: 1px solid #4a6fa5;
      box-shadow: 0 8px 0 #0f1a2a;
    }
    .ref-title { font-size: 18px; font-weight: 700; color: #FFD966; margin-bottom: 14px; }
    .ref-link-row { display: flex; gap: 6px; margin: 10px 0; align-items: center; }
    .ref-link-input {
      flex: 1; background: #0f1322; border: 1px solid #3e5a7c; border-radius: 40px;
      padding: 10px 12px; color: #ddd; font-size: 12px;
    }
    .copy-btn, .share-btn {
      border: none; color: white; font-weight: bold; font-size: 12px; cursor: pointer;
      border-radius: 40px; padding: 8px 12px; box-shadow: 0 4px 0 #0f1a2a;
      background: #2a3a5a;
    }
    .share-btn { background: #2e5f4b; box-shadow: 0 4px 0 #1a3a2e; }
    .ref-stats { display: flex; justify-content: space-around; margin-top: 18px; background: #1a1f33; border-radius: 40px; padding: 12px; }
    .ref-stat-value { font-size: 24px; font-weight: bold; color: #FFB347; }

    .withdraw-section {
      margin-top: 15px; display: none; background: rgba(20, 20, 30, 0.95);
      padding: 22px 18px; border-radius: 24px; border: 1px solid #3f3f6b;
    }
    .withdraw-section input, .withdraw-section select {
      width: 100%; padding: 14px; margin: 8px 0; border-radius: 40px;
      background: #0f0f1e; border: 1px solid #3e4b6b; color: #fff;
    }
    .withdraw-section button {
      width: 100%; padding: 14px; margin-top: 14px; font-weight: bold;
      background: linear-gradient(145deg, #1FA2FF, #12D8FA, #A6FFCB);
      color: #0b0b1a; border: none; border-radius: 40px;
    }

    .links a { display: block; margin: 15px 0 5px; padding: 14px; border-radius: 60px; background: linear-gradient(90deg,#f7971e,#ffd200); color:#0f0c1c; text-decoration:none; font-weight:bold; }
    .ad-status-tip { font-size: 13px; margin-top: 12px; opacity: 0.8; }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loader-radar">
    <div class="loader-circle" id="loaderCircle"></div>
    <div class="loader-sweep"></div>
    <div class="loader-line"></div>
  </div>
  <div class="loading-bar-container">
    <div class="loading-bar-fill" id="loadingBarFill"></div>
  </div>
  <div class="loading-percent-small" id="loadingPercentLabel">0%</div>
  <div class="loading-message">INITIALIZING RADAR</div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div class="container">
    <h1>⚡RADAR·ADS</h1>
    <a href="https://t.me/ads_program_bd" target="_blank" class="developer">📢 Join Telegram Community</a>

    <div class="stats">
      <p>📺 Watched Ads: <span id="watched-ads">0</span></p>
      <p>💰 Earned Points: <span id="earned-points">0.00</span></p>
    </div>

    <div class="progress-circle-wrapper">
      <div class="progress-circle" id="progress-circle"></div>
      <div class="radar-sweep"></div>
      <div class="radar-line"></div>
      <div class="progress-text" id="ads-progress">0%</div>
    </div>

    <div class="buttons">
      <button id="watch-ad-btn">▶ Watch Ad (+0.5)</button>
      <button id="auto-ad-btn">⚡ Auto Ads (6s)</button>
      <button id="stop-auto-btn" disabled>⏹ Stop Auto</button>
      <button id="toggle-withdraw-btn">💸 Withdraw</button>
    </div>

    <div class="referral-card">
      <div class="ref-title">🤝 REFER & EARN (+5 pts/invite)</div>
      <div class="ref-link-row">
        <input type="text" class="ref-link-input" id="referralLinkInput" readonly value="loading...">
        <button class="copy-btn" id="copyLinkBtn">📋 Copy</button>
        <button class="share-btn" id="shareLinkBtn">📤 Share</button>
      </div>
      <div class="ref-stats">
        <div><div class="ref-stat-value" id="referralCount">0</div><div>Invited</div></div>
        <div><div class="ref-stat-value" id="referralEarnings">0.0</div><div>Bonus pts</div></div>
      </div>
      <p style="font-size:12px; margin-top:10px; color:#aabae0;">Share your link · Get 5 pts when friend joins</p>
    </div>

    <div class="withdraw-section" id="withdraw-section">
      <input type="number" id="withdraw-amount" placeholder="Points (min 5)" step="0.1">
      <select id="payment-method"><option>bKash</option><option>Nagad</option><option>Manual</option></select>
      <input type="text" id="withdraw-phone" placeholder="Phone / Account">
      <button id="submit-withdraw">✔ Submit</button>
      <p id="withdraw-status"></p>
    </div>

    <div class="links"><a href="https://t.me/adbox_chat">💬 Any Help or Support</a></div>
    <div class="ad-status-tip" id="ad-loader-status">⚙️ Loading ad system...</div>
  </div>
</div>

<script src='//libtl.com/sdk.js' data-zone='10831466' data-sdk='show_10831466'></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  (function(){
    "use strict";

    // ---------- LOADING SEQUENCE (fixed) ----------
    const loadingScreen = document.getElementById('loading-screen');
    const mainApp = document.getElementById('main-app');
    const loaderCircle = document.getElementById('loaderCircle');
    const loadingBarFill = document.getElementById('loadingBarFill');
    const loadingPercentLabel = document.getElementById('loadingPercentLabel');
    
    let progress = 0;
    const duration = 2500; // 2.5 seconds
    const startTime = Date.now();
    
    function updateLoading() {
      const elapsed = Date.now() - startTime;
      progress = Math.min((elapsed / duration) * 100, 100);
      
      loaderCircle.style.background = `conic-gradient(#00ffcc ${progress}%, rgba(0, 255, 204, 0.15) ${progress}%)`;
      loadingBarFill.style.width = progress + '%';
      loadingPercentLabel.textContent = Math.floor(progress) + '%';
      
      if (progress < 100) {
        requestAnimationFrame(updateLoading);
      } else {
        // Ensure minimum display time
        setTimeout(() => {
          loadingScreen.style.opacity = '0';
          mainApp.style.opacity = '1';
          setTimeout(() => {
            loadingScreen.style.display = 'none';
          }, 500);
        }, 200);
      }
    }
    
    // Start loading animation
    requestAnimationFrame(updateLoading);

    // Telegram Web App
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // ---------- APP LOGIC (identical to previous, with small safety) ----------
    const BOT_USERNAME = 'radar_ads_bot';
    const TELEGRAM_BOT_LINK = `https://t.me/${BOT_USERNAME}`;

    // State
    let watchedAdsCount = parseInt(localStorage.getItem('watchedAdsCount')) || 0;
    let earnedPoints = parseFloat(localStorage.getItem('earnedPoints')) || 0.0;
    let adCountSession = parseInt(localStorage.getItem('adCountSession')) || 0;
    let lastCooldownStart = parseInt(localStorage.getItem('lastCooldownStart')) || 0;
    
    let autoAdInterval = null;
    let isAdInProgress = false;
    let monetagReady = false;

    // Referral
    let myReferralCode = localStorage.getItem('myReferralCode');
    if (!myReferralCode) {
      myReferralCode = Math.random().toString(36).substring(2, 8).toUpperCase();
      localStorage.setItem('myReferralCode', myReferralCode);
    }
    let referralCount = parseInt(localStorage.getItem('referralCount')) || 0;
    let referralEarnings = parseFloat(localStorage.getItem('referralEarnings')) || 0.0;
    
    const urlParams = new URLSearchParams(window.location.search);
    let refParam = urlParams.get('start') || urlParams.get('ref');
    if (refParam) {
      const processedKey = `ref_processed_${refParam}`;
      if (!localStorage.getItem(processedKey)) {
        localStorage.setItem(processedKey, '1');
        const rewardKey = `ref_reward_${refParam}`;
        const countKey = `ref_count_${refParam}`;
        localStorage.setItem(rewardKey, (parseFloat(localStorage.getItem(rewardKey)) || 0) + 5.0);
        localStorage.setItem(countKey, (parseInt(localStorage.getItem(countKey)) || 0) + 1);
        earnedPoints += 2.0;
        localStorage.setItem('earnedPoints', earnedPoints.toFixed(2));
      }
    }
    
    function loadMyReferralStats() {
      const rewardKey = `ref_reward_${myReferralCode}`;
      const countKey = `ref_count_${myReferralCode}`;
      referralEarnings = parseFloat(localStorage.getItem(rewardKey)) || 0.0;
      referralCount = parseInt(localStorage.getItem(countKey)) || 0;
      localStorage.setItem('referralEarnings', referralEarnings);
      localStorage.setItem('referralCount', referralCount);
    }
    loadMyReferralStats();

    // DOM elements
    const watchedSpan = document.getElementById('watched-ads');
    const pointsSpan = document.getElementById('earned-points');
    const progressCircle = document.getElementById('progress-circle');
    const progressText = document.getElementById('ads-progress');
    const watchBtn = document.getElementById('watch-ad-btn');
    const autoBtn = document.getElementById('auto-ad-btn');
    const stopAutoBtn = document.getElementById('stop-auto-btn');
    const withdrawSection = document.getElementById('withdraw-section');
    const toggleWithdrawBtn = document.getElementById('toggle-withdraw-btn');
    const submitWithdrawBtn = document.getElementById('submit-withdraw');
    const withdrawAmount = document.getElementById('withdraw-amount');
    const paymentMethod = document.getElementById('payment-method');
    const withdrawPhone = document.getElementById('withdraw-phone');
    const withdrawStatus = document.getElementById('withdraw-status');
    const loaderStatus = document.getElementById('ad-loader-status');
    
    const referralLinkInput = document.getElementById('referralLinkInput');
    const referralCountSpan = document.getElementById('referralCount');
    const referralEarningsSpan = document.getElementById('referralEarnings');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const shareLinkBtn = document.getElementById('shareLinkBtn');

    function refreshUI() {
      watchedSpan.textContent = watchedAdsCount;
      pointsSpan.textContent = earnedPoints.toFixed(2);
      updateProgressCircle();
      referralLinkInput.value = `${TELEGRAM_BOT_LINK}?start=${myReferralCode}`;
      loadMyReferralStats();
      referralCountSpan.textContent = referralCount;
      referralEarningsSpan.textContent = referralEarnings.toFixed(1);
      checkCooldown();
    }

    function updateProgressCircle() {
      let percent = Math.min((watchedAdsCount / 10) * 100, 100);
      progressText.textContent = Math.floor(percent) + '%';
      progressCircle.style.background = `conic-gradient(#00ffcc ${percent}%, rgba(0, 255, 204, 0.1) ${percent}%)`;
    }

    function saveData() {
      localStorage.setItem('watchedAdsCount', watchedAdsCount);
      localStorage.setItem('earnedPoints', earnedPoints.toFixed(2));
      localStorage.setItem('adCountSession', adCountSession);
      localStorage.setItem('lastCooldownStart', lastCooldownStart);
    }

    function isInCooldown() {
      if (adCountSession >= 20) {
        if (Date.now() - lastCooldownStart < 60000) return true;
        else { adCountSession = 0; lastCooldownStart = 0; saveData(); }
      }
      return false;
    }

    function getCooldownSeconds() {
      if (adCountSession >= 20 && lastCooldownStart) {
        return Math.ceil(Math.max(0, 60000 - (Date.now() - lastCooldownStart)) / 1000);
      }
      return 0;
    }

    function checkCooldown() {
      if (isInCooldown()) {
        watchBtn.disabled = true;
        if (autoAdInterval) stopAutoAds();
        loaderStatus.innerHTML = `⏳ Cooldown: ${getCooldownSeconds()}s`;
      } else {
        if (monetagReady) watchBtn.disabled = false;
        loaderStatus.innerHTML = monetagReady ? '✅ Ready' : '⚙️ Ad loading...';
      }
    }

    function checkMonetag() {
      if (typeof window.show_10831466 === 'function') {
        monetagReady = true;
        checkCooldown();
      } else {
        setTimeout(checkMonetag, 500);
      }
    }
    checkMonetag();

    async function watchAd() {
      if (!monetagReady) return Swal.fire({ icon: 'warning', title: 'Ad not ready' });
      if (isInCooldown()) return Swal.fire({ icon: 'warning', title: 'Cooldown', text: `Wait ${getCooldownSeconds()}s` });
      if (isAdInProgress) return;
      
      isAdInProgress = true;
      watchBtn.disabled = true;
      
      let timerInterval;
      Swal.fire({
        title: '🎬 Ad Playing', html: 'Wait <b>15</b> sec', timer: 15000, timerProgressBar: true,
        allowOutsideClick: false, showConfirmButton: false,
        didOpen: () => {
          const b = Swal.getHtmlContainer().querySelector('b');
          timerInterval = setInterval(() => { if (Swal.getTimerLeft()) b.textContent = Math.ceil(Swal.getTimerLeft()/1000); }, 100);
        },
        willClose: () => clearInterval(timerInterval)
      }).then(async (result) => {
        if (result.dismiss === Swal.DismissReason.timer) {
          try { await window.show_10831466(); } catch(e){}
          watchedAdsCount++; earnedPoints += 0.5; adCountSession++;
          if (adCountSession >= 20) {
            lastCooldownStart = Date.now();
            Swal.fire({ icon: 'success', title: '20 Ads done!', text: '60s break', timer: 2000, showConfirmButton: false });
          } else {
            Swal.fire({ icon: 'success', title: 'Earned!', text: `+0.5 · ${adCountSession}/20`, timer: 1500, showConfirmButton: false });
          }
          saveData(); refreshUI();
        }
        isAdInProgress = false;
        if (!isInCooldown() && monetagReady) watchBtn.disabled = false;
        checkCooldown();
      });
    }

    function startAutoAds() {
      if (autoAdInterval) return;
      if (!monetagReady) return Swal.fire('Ad not ready');
      if (isInCooldown()) return Swal.fire({ icon: 'warning', title: 'Cooldown active' });
      autoBtn.disabled = true; stopAutoBtn.disabled = false;
      loaderStatus.innerHTML = '🔄 Auto ON (6s)';
      autoAdInterval = setInterval(() => {
        if (!isAdInProgress && monetagReady && !isInCooldown()) watchAd();
        else if (isInCooldown()) stopAutoAds();
      }, 6000);
    }

    function stopAutoAds() {
      clearInterval(autoAdInterval);
      autoAdInterval = null;
      autoBtn.disabled = false; stopAutoBtn.disabled = true;
      if (!isInCooldown()) loaderStatus.innerHTML = '⏸ Auto stopped';
    }

    function toggleWithdraw() {
      withdrawSection.style.display = withdrawSection.style.display === 'block' ? 'none' : 'block';
    }

    function submitWithdraw() {
      const amount = parseFloat(withdrawAmount.value);
      const phone = withdrawPhone.value.trim();
      if (isNaN(amount) || amount < 5) return withdrawStatus.textContent = '❌ Min 5 pts';
      if (amount > earnedPoints) return withdrawStatus.textContent = '❌ Insufficient';
      if (!phone) return withdrawStatus.textContent = '❌ Enter phone';
      earnedPoints -= amount;
      saveData(); refreshUI();
      withdrawStatus.innerHTML = `✅ ${amount} pts withdrawal (${paymentMethod.value})<br>📞 ${phone}`;
      withdrawAmount.value = withdrawPhone.value = '';
    }

    copyLinkBtn.onclick = () => navigator.clipboard?.writeText(referralLinkInput.value).then(() => Swal.fire({ icon: 'success', title: 'Link Copied!', timer: 1500, showConfirmButton: false }));
    shareLinkBtn.onclick = () => {
      const link = referralLinkInput.value;
      if (navigator.share) navigator.share({ title: 'Radar-Ads', url: link });
      else copyLinkBtn.onclick();
    };

    watchBtn.onclick = (e) => { e.preventDefault(); watchAd(); };
    autoBtn.onclick = startAutoAds;
    stopAutoBtn.onclick = stopAutoAds;
    toggleWithdrawBtn.onclick = toggleWithdraw;
    submitWithdrawBtn.onclick = submitWithdraw;

    // Apply referral bonus to earnings
    (function applyBonus() {
      const key = 'ref_bonus_applied_' + myReferralCode;
      const last = parseFloat(localStorage.getItem(`ref_reward_${myReferralCode}`)) || 0;
      const applied = parseFloat(localStorage.getItem(key)) || 0;
      if (last > applied) {
        earnedPoints += (last - applied);
        localStorage.setItem(key, last);
        saveData();
      }
    })();

    refreshUI();
    setInterval(checkCooldown, 1000);
  })();
</script>
</body>
</html>
